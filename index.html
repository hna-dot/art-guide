<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>GALERIE — 세계 미술관 도슨트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b09;
      --bg-card: #131210;
      --bg-hover: #1a1815;
      --gold: #c9a84c;
      --gold-dim: #7a6330;
      --cream: #e8e0d0;
      --muted: #5a5650;
      --border: #252320;
      --tag-bg: #1e1c18;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 11, 9, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.3s ease;
    }
    header.hide { transform: translateY(-100%); }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      cursor: pointer;
    }
    .logo:hover { opacity: 0.8; }
    .logo span {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      margin-left: 16px;
      vertical-align: middle;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .museum-filter {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold-dim);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.05);
    }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ════════════════════════════
       LANDING PAGE
    ════════════════════════════ */
    #landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .landing-hero {
      padding: 100px 48px 60px;
      max-width: 860px;
    }

    .landing-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .landing-eyebrow::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--gold-dim);
    }

    .landing-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 7vw, 96px);
      font-weight: 300;
      line-height: 1.0;
      color: var(--cream);
      margin-bottom: 24px;
    }
    .landing-h1 em { font-style: italic; color: var(--gold); }

    .landing-desc {
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
      max-width: 480px;
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    /* City Cards */
    .city-grid {
      padding: 0 48px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      flex: 1;
    }

    .city-card {
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: var(--bg-card);
      aspect-ratio: 3/4;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .city-card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.4) saturate(0.7);
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
    }

    .city-card:hover .city-card-bg {
      transform: scale(1.05);
      filter: brightness(0.55) saturate(0.85);
    }

    .city-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(12,11,9,0.95) 0%, transparent 60%);
    }

    .city-card-content {
      position: relative;
      z-index: 1;
      padding: 32px 32px 36px;
    }

    .city-card-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 300;
      color: rgba(201, 168, 76, 0.12);
      line-height: 1;
      margin-bottom: -16px;
      display: block;
    }

    .city-card-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }

    .city-card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 300;
      color: var(--cream);
      line-height: 1;
      margin-bottom: 10px;
    }

    .city-card-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      font-family: 'Noto Serif KR', serif;
    }

    .city-card-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 2px;
      transition: all 0.2s;
    }
    .city-card:hover .city-card-cta {
      border-color: var(--gold);
      gap: 12px;
    }

    /* Landing stats */
    .landing-stats {
      padding: 0 48px 48px;
      display: flex;
      gap: 48px;
      border-top: 1px solid var(--border);
      padding-top: 32px;
      margin: 0 48px;
      margin-bottom: 0;
    }
    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: var(--gold);
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ════════════════════════════
       GALLERY PAGE
    ════════════════════════════ */
    .gallery-header-bar {
      background: rgba(12, 11, 9, 0.5);
      border-bottom: 1px solid var(--border);
      padding: 12px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .back-btn:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .gallery-city-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      color: var(--cream);
    }

    .gallery-city-label span {
      color: var(--muted);
      font-size: 12px;
      margin-left: 8px;
      font-family: 'DM Sans', sans-serif;
    }

    .hero {
      padding: 80px 48px 60px;
      max-width: 900px;
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--gold-dim);
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 300;
      line-height: 1.1;
      color: var(--cream);
      margin-bottom: 20px;
    }
    .hero-sub em { font-style: italic; color: var(--gold); }

    .hero-desc {
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
      max-width: 520px;
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    /* ── MUSEUM SECTION ── */
    .museum-section { padding: 0 48px 80px; }
    .museum-header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .museum-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--cream);
    }
    .museum-meta {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .museum-count {
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--gold-dim);
    }

    /* ── ARTWORK GRID ── */
    .artwork-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .artwork-card {
      background: var(--bg-card);
      cursor: pointer;
      transition: background 0.3s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .artwork-card:hover { background: var(--bg-hover); }
    .artwork-card:hover .card-image img { transform: scale(1.04); }
    .artwork-card:hover .card-overlay { opacity: 1; }

    .card-image {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #1a1815;
    }
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: saturate(0.85) brightness(0.9);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(12,11,9,0.9) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }
    .card-overlay-text {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(232, 224, 208, 0.8);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    .card-priority {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--gold);
      color: var(--bg);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 8px;
      font-weight: 500;
    }

    .card-body { padding: 20px 24px 24px; }
    .card-artist {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .card-title-original {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .card-one-line {
      font-size: 12px;
      line-height: 1.65;
      color: rgba(232, 224, 208, 0.55);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 7, 6, 0.92);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      max-width: 960px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: var(--bg); }
    .modal::-webkit-scrollbar-thumb { background: var(--gold-dim); }

    .modal-image-side { position: relative; background: #0f0e0c; }
    .modal-image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.9) brightness(0.85);
      min-height: 400px;
    }
    .modal-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(12,11,9,0.5));
    }

    .modal-content-side {
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }
    .modal-close:hover { border-color: var(--gold-dim); color: var(--gold); }

    .modal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      line-height: 1.15;
      color: var(--cream);
    }
    .modal-title-original {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--muted);
      margin-top: 4px;
    }
    .modal-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .modal-meta-row { display: flex; justify-content: space-between; font-size: 12px; }
    .modal-meta-key {
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 10px;
    }
    .modal-meta-val {
      color: var(--cream);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    .docent-section { display: flex; flex-direction: column; gap: 20px; }
    .docent-block { display: flex; flex-direction: column; gap: 8px; }
    .docent-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .docent-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .docent-one-line {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      line-height: 1.5;
      color: var(--cream);
    }
    .docent-story {
      font-size: 13px;
      line-height: 1.9;
      color: rgba(232, 224, 208, 0.7);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }
    .docent-look-for {
      font-size: 12px;
      line-height: 1.8;
      color: rgba(201, 168, 76, 0.75);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      padding: 14px 16px;
      border-left: 2px solid var(--gold-dim);
      background: rgba(201, 168, 76, 0.04);
    }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }

    /* ── FOOTER ── */
    footer {
      padding: 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }
    .footer-note { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

    /* ── UTILS ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    .hidden { display: none !important; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .city-card { animation: fadeUp 0.6s ease both; }
    .city-card:nth-child(1) { animation-delay: 0ms; }
    .city-card:nth-child(2) { animation-delay: 80ms; }
    .city-card:nth-child(3) { animation-delay: 160ms; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .city-grid { grid-template-columns: 1fr; gap: 2px; padding: 0 16px 60px; }
      .city-card { aspect-ratio: 16/9; }
    }

    @media (max-width: 768px) {
      header { padding: 0 16px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
      .logo span { display: none; }
      .museum-filter { gap: 4px; }
      .filter-btn { padding: 5px 10px; font-size: 10px; }
      .landing-hero { padding: 60px 20px 40px; }
      .landing-stats { margin: 0 20px; padding: 24px 0 0; gap: 28px; }
      .city-grid { padding: 24px 20px 60px; }
      .hero { padding: 60px 20px 40px; }
      .gallery-header-bar { padding: 12px 20px; }
      .museum-section { padding: 0 20px 60px; }
      .artwork-grid { grid-template-columns: 1fr 1fr; gap: 2px; }
      .modal { grid-template-columns: 1fr; max-height: 85vh; }
      .modal-image-side img { min-height: 240px; max-height: 300px; }
      .modal-content-side { padding: 28px 24px; }
      footer { padding: 32px 20px; flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

  <header id="main-header">
    <div class="logo" id="logo-btn">Galerie <span id="header-subtitle">세계 미술관 도슨트</span></div>
    <div class="header-right">
      <div class="museum-filter" id="museum-filter" style="display:none"></div>
    </div>
  </header>

  <!-- ════ LANDING PAGE ════ -->
  <div id="landing" class="page active">
    <div class="landing-hero">
      <div class="landing-eyebrow">세계 · 3개 도시</div>
      <h1 class="landing-h1">여행 전 꼭 봐야 할<br><em>명화들</em></h1>
      <p class="landing-desc">파리, 서울, 뉴욕의 필수 미술관 도슨트. 전문 지식 없이도 그림 앞에서 깊이 있는 감상을 할 수 있도록, 핵심만 담았습니다.</p>
    </div>

    <div class="city-grid" id="city-grid"></div>

    <div class="landing-stats">
      <div class="stat">
        <div class="stat-num">3</div>
        <div class="stat-label">도시</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="total-museums">9</div>
        <div class="stat-label">미술관</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="total-works">52</div>
        <div class="stat-label">작품</div>
      </div>
    </div>

    <footer>
      <div class="footer-logo">Galerie</div>
      <div class="footer-note">이미지 출처: Wikimedia Commons (Public Domain)</div>
    </footer>
  </div>

  <!-- ════ GALLERY PAGE ════ -->
  <div id="gallery" class="page">
    <div class="gallery-header-bar">
      <button class="back-btn" id="back-btn">← 도시 선택</button>
      <div class="gallery-city-label" id="gallery-city-label"></div>
    </div>
    <section class="hero" id="gallery-hero"></section>
    <main id="main-content"></main>
    <footer>
      <div class="footer-logo">Galerie</div>
      <div class="footer-note">이미지 출처: Wikimedia Commons / Public Domain</div>
    </footer>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-inner">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-image-side">
        <img id="modal-img" src="" alt="" referrerpolicy="no-referrer" />
        <div class="modal-image-overlay"></div>
      </div>
      <div class="modal-content-side">
        <div>
          <div class="modal-eyebrow" id="modal-museum"></div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-title-original" id="modal-title-original"></div>
        </div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="docent-section">
          <div class="docent-block">
            <div class="docent-label">한 줄 요약</div>
            <div class="docent-one-line" id="modal-one-line"></div>
          </div>
          <div class="docent-block">
            <div class="docent-label">작품 이야기</div>
            <div class="docent-story" id="modal-story"></div>
          </div>
          <div class="docent-block">
            <div class="docent-label">이것만은 찾아보자</div>
            <div class="docent-look-for" id="modal-look-for"></div>
          </div>
        </div>
        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  <script>
    // ── CITY CONFIG ──
    const CITIES = [
      {
        id: 'paris',
        name: '파리',
        nameEn: 'Paris',
        country: '프랑스',
        file: 'paris.json',
        desc: '루브르, 오르세, 오랑주리',
        bg: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/La_Tour_Eiffel_vue_de_la_Tour_Saint-Jacques%2C_Paris_ao%C3%BBt_2014_%282%29.jpg/800px-La_Tour_Eiffel_vue_de_la_Tour_Saint-Jacques%2C_Paris_ao%C3%BBt_2014_%282%29.jpg'
      },
      {
        id: 'seoul',
        name: '서울',
        nameEn: 'Seoul',
        country: '대한민국',
        file: 'seoul.json',
        desc: '국립중앙박물관, 리움, 국립현대미술관',
        bg: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/N_Seoul_Tower_from_Namsan_Mountain.jpg/800px-N_Seoul_Tower_from_Namsan_Mountain.jpg'
      },
      {
        id: 'newyork',
        name: '뉴욕',
        nameEn: 'New York',
        country: '미국',
        file: 'newyork.json',
        desc: '메트, MoMA, 구겐하임',
        bg: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Southwest_corner_of_Central_Park%2C_looking_east%2C_NYC.jpg/800px-Southwest_corner_of_Central_Park%2C_looking_east%2C_NYC.jpg'
      }
    ];

    // ── STATE ──
    let currentData = null;
    const cache = {};

    // ── LANDING ──
    function renderLanding() {
      const grid = document.getElementById('city-grid');
      grid.innerHTML = '';
      CITIES.forEach((city, i) => {
        const card = document.createElement('div');
        card.className = 'city-card';
        card.style.animationDelay = `${i * 80}ms`;
        card.innerHTML = `
          <div class="city-card-bg" style="background-image:url('${city.bg}')"></div>
          <div class="city-card-overlay"></div>
          <div class="city-card-content">
            <span class="city-card-num">0${i + 1}</span>
            <div class="city-card-label">${city.country}</div>
            <div class="city-card-name">${city.name}</div>
            <div class="city-card-sub">${city.desc}</div>
            <div class="city-card-cta">감상하기 →</div>
          </div>
        `;
        card.addEventListener('click', () => loadCity(city));
        grid.appendChild(card);
      });
    }

    // ── LOAD CITY ──
    async function loadCity(city) {
      if (!cache[city.id]) {
        try {
          const res = await fetch(city.file);
          cache[city.id] = await res.json();
        } catch (e) {
          alert(`${city.name} 데이터를 불러올 수 없습니다. ${city.file} 파일을 확인해주세요.`);
          return;
        }
      }
      currentData = cache[city.id];
      showGallery(city, currentData);
    }

    // ── SHOW GALLERY ──
    function showGallery(city, data) {
      // Switch pages
      document.getElementById('landing').classList.remove('active');
      document.getElementById('gallery').classList.add('active');

      // Header
      document.getElementById('header-subtitle').textContent = `${city.name} · 도슨트 가이드`;
      document.getElementById('gallery-city-label').innerHTML =
        `${city.name} <span>${city.nameEn}, ${city.country}</span>`;

      // Hero
      const museums = [...new Set(data.artworks.map(a => a.museum))];
      document.getElementById('gallery-hero').innerHTML = `
        <div class="hero-eyebrow">${city.name} · ${museums.length}개 미술관</div>
        <h2 class="hero-sub">실전 압축 <em>도슨트</em></h2>
        <p class="hero-desc">${museums.join(', ')}의 필수 작품 ${data.artworks.length}점. 전문 지식 없이도 그림 앞에서 깊이 있는 감상을 할 수 있도록, 도슨트의 핵심만 담았습니다.</p>
      `;

      // Museum filter
      const filterEl = document.getElementById('museum-filter');
      filterEl.style.display = 'flex';
      filterEl.innerHTML = `<button class="filter-btn active" data-filter="all">전체</button>` +
        museums.map(m => `<button class="filter-btn" data-filter="${m}">${m}</button>`).join('');
      filterEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filterEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const f = btn.dataset.filter;
          document.querySelectorAll('.museum-section').forEach(s => {
            s.classList.toggle('hidden', f !== 'all' && s.dataset.museum !== f);
          });
        });
      });

      // Content
      renderGalleryContent(data);

      // Scroll to top
      window.scrollTo(0, 0);
    }

    function renderGalleryContent(data) {
      const main = document.getElementById('main-content');
      main.innerHTML = '';
      const museums = [...new Set(data.artworks.map(a => a.museum))];
      let delay = 0;
      museums.forEach(museum => {
        const artworks = data.artworks.filter(a => a.museum === museum);
        const section = document.createElement('section');
        section.className = 'museum-section';
        section.dataset.museum = museum;
        section.innerHTML = `
          <div class="museum-header">
            <div class="museum-name">${museum}</div>
            <div class="museum-meta">${data.meta.city}, ${data.meta.country}</div>
            <div class="museum-count">${artworks.length} works</div>
          </div>
          <div class="artwork-grid" id="grid-${museum.replace(/\s/g,'_')}"></div>
        `;
        const grid = section.querySelector('.artwork-grid');
        artworks.forEach((work, i) => {
          const card = document.createElement('div');
          card.className = 'artwork-card';
          card.style.animationDelay = `${(delay + i) * 60}ms`;
          const isPriority = work.tags?.includes('필수');
          card.innerHTML = `
            <div class="card-image">
              <img src="${work.image_url}" alt="${work.title}" loading="lazy" referrerpolicy="no-referrer" />
              <div class="card-overlay">
                <div class="card-overlay-text">${work.docent.look_for.slice(0, 80)}…</div>
              </div>
              ${isPriority ? '<div class="card-priority">필수</div>' : ''}
            </div>
            <div class="card-body">
              <div class="card-artist">${work.artist}</div>
              <div class="card-title">${work.title}</div>
              <div class="card-title-original">${work.title_original} · ${work.year}</div>
              <div class="card-one-line">${work.docent.one_line}</div>
              <div class="card-tags">
                ${(work.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
            </div>
          `;
          card.addEventListener('click', () => openModal(work));
          grid.appendChild(card);
        });
        main.appendChild(section);
        delay += artworks.length;
      });
    }

    // ── BACK TO LANDING ──
    function goToLanding() {
      document.getElementById('gallery').classList.remove('active');
      document.getElementById('landing').classList.add('active');
      document.getElementById('header-subtitle').textContent = '세계 미술관 도슨트';
      document.getElementById('museum-filter').style.display = 'none';
      window.scrollTo(0, 0);
    }

    document.getElementById('back-btn').addEventListener('click', goToLanding);
    document.getElementById('logo-btn').addEventListener('click', () => {
      if (document.getElementById('gallery').classList.contains('active')) goToLanding();
    });

    // ── MODAL ──
    function openModal(work) {
      document.getElementById('modal-img').src = work.image_url;
      document.getElementById('modal-img').alt = work.title;
      document.getElementById('modal-museum').textContent = `${work.museum} · ${work.style}`;
      document.getElementById('modal-title').textContent = work.title;
      document.getElementById('modal-title-original').textContent = work.title_original;
      document.getElementById('modal-one-line').textContent = work.docent.one_line;
      document.getElementById('modal-story').textContent = work.docent.story;
      document.getElementById('modal-look-for').textContent = work.docent.look_for;
      document.getElementById('modal-meta').innerHTML = `
        <div class="modal-meta-row"><span class="modal-meta-key">작가</span><span class="modal-meta-val">${work.artist}</span></div>
        <div class="modal-meta-row"><span class="modal-meta-key">제작연도</span><span class="modal-meta-val">${work.year}</span></div>
        <div class="modal-meta-row"><span class="modal-meta-key">양식</span><span class="modal-meta-val">${work.style}</span></div>
        <div class="modal-meta-row"><span class="modal-meta-key">소장처</span><span class="modal-meta-val">${work.museum}, ${work.city}</span></div>
      `;
      document.getElementById('modal-tags').innerHTML =
        (work.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('modal-inner').scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── SCROLL HIDE HEADER ──
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      if (window.innerWidth > 768) return;
      const cur = window.scrollY;
      document.querySelector('header').classList.toggle('hide', cur > lastScroll && cur > 80);
      lastScroll = cur;
    }, { passive: true });

    // ── INIT ──
    renderLanding();
  </script>
</body>
</html>
