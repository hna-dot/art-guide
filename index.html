<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>GALERIE — 파리 미술관 도슨트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b09;
      --bg-card: #131210;
      --bg-hover: #1a1815;
      --gold: #c9a84c;
      --gold-dim: #7a6330;
      --cream: #e8e0d0;
      --muted: #5a5650;
      --border: #252320;
      --tag-bg: #1e1c18;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      cursor: default;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12, 11, 9, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.3s ease;
    }

    header.hide {
      transform: translateY(-100%);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .logo span {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.2em;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      margin-left: 16px;
      vertical-align: middle;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .museum-filter {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--gold-dim);
      color: var(--gold);
      background: rgba(201, 168, 76, 0.05);
    }

    /* ── HERO ── */
    .hero {
      padding: 120px 48px 80px;
      max-width: 900px;
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--gold-dim);
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 7vw, 96px);
      font-weight: 300;
      line-height: 1.0;
      color: var(--cream);
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 300;
      line-height: 1.15;
      color: var(--cream);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }

    .hero-sub em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-desc {
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
      max-width: 520px;
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      padding: 0 48px 64px;
      display: flex;
      gap: 48px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      color: var(--gold);
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── MUSEUM SECTION ── */
    .museum-section {
      padding: 0 48px 80px;
    }

    .museum-header {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .museum-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--cream);
    }

    .museum-meta {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .museum-count {
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--gold-dim);
    }

    /* ── ARTWORK GRID ── */
    .artwork-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .artwork-card {
      background: var(--bg-card);
      cursor: pointer;
      transition: background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .artwork-card:hover {
      background: var(--bg-hover);
    }

    .artwork-card:hover .card-image img {
      transform: scale(1.04);
    }

    .artwork-card:hover .card-overlay {
      opacity: 1;
    }

    .card-image {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #1a1815;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: saturate(0.85) brightness(0.9);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(12,11,9,0.9) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }

    .card-overlay-text {
      font-size: 12px;
      line-height: 1.6;
      color: rgba(232, 224, 208, 0.8);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    .card-priority {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--gold);
      color: var(--bg);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 4px 8px;
      font-weight: 500;
    }

    .card-body {
      padding: 20px 24px 24px;
    }

    .card-artist {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.25;
      color: var(--cream);
      margin-bottom: 4px;
    }

    .card-title-original {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card-one-line {
      font-size: 12px;
      line-height: 1.65;
      color: rgba(232, 224, 208, 0.55);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 7, 6, 0.92);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 768px) {
      .modal-overlay {
        padding: 0;
        align-items: flex-start;
      }
      .modal {
        width: 100%;
        max-height: 100vh;
        border-left: none;
        border-right: none;
        border-radius: 0;
      }
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      max-width: 960px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-track { background: var(--bg); }
    .modal::-webkit-scrollbar-thumb { background: var(--gold-dim); }

    .modal-image-side {
      position: relative;
      background: #0f0e0c;
    }

    .modal-image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.9) brightness(0.85);
      min-height: 400px;
    }

    .modal-image-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(12,11,9,0.5));
    }

    .modal-content-side {
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }

    .modal-close:hover {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    .modal-eyebrow {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      line-height: 1.15;
      color: var(--cream);
    }

    .modal-title-original {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--muted);
      margin-top: 4px;
    }

    .modal-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .modal-meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .modal-meta-key {
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 10px;
    }

    .modal-meta-val {
      color: var(--cream);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    .docent-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .docent-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .docent-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .docent-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .docent-one-line {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      line-height: 1.5;
      color: var(--cream);
    }

    .docent-story {
      font-size: 13px;
      line-height: 1.9;
      color: rgba(232, 224, 208, 0.7);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
    }

    .docent-look-for {
      font-size: 12px;
      line-height: 1.8;
      color: rgba(201, 168, 76, 0.75);
      font-family: 'Noto Serif KR', serif;
      font-weight: 300;
      padding: 14px 16px;
      border-left: 2px solid var(--gold-dim);
      background: rgba(201, 168, 76, 0.04);
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: auto;
    }

    /* ── FOOTER ── */
    footer {
      padding: 48px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
    }

    .footer-note {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .artwork-card {
      animation: fadeUp 0.5s ease both;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 0 16px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
      .logo span { display: none; }
      .museum-filter { gap: 4px; }
      .filter-btn { padding: 5px 10px; font-size: 10px; }
      .hero { padding: 60px 20px 40px; }
      .stats-bar { padding: 0 20px 40px; gap: 28px; }
      .museum-section { padding: 0 20px 60px; }
      .artwork-grid { grid-template-columns: 1fr 1fr; gap: 2px; }
      .modal { grid-template-columns: 1fr; }
      .modal-image-side { display: block; }
      .modal-image-side img { min-height: 240px; max-height: 300px; width: 100%; object-fit: cover; }
      .modal-content-side { padding: 28px 24px; }
      footer { padding: 32px 20px; flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Galerie <span>Paris · Docent Guide</span></div>
    <div class="museum-filter">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="루브르">루브르</button>
      <button class="filter-btn" data-filter="오르세">오르세</button>
      <button class="filter-btn" data-filter="오랑주리">오랑주리</button>
    </div>
  </header>



  <section class="hero">
    <div class="hero-eyebrow">파리 · 3개 미술관</div>
    <h2 class="hero-sub">실전 압축 <em>도슨트</em></h2>
    <p class="hero-desc">루브르, 오르세, 오랑주리의 필수 작품 25점. 전문 지식 없이도 그림 앞에서 깊이 있는 감상을 할 수 있도록, 도슨트의 핵심만 담았습니다.</p>
  </section>

  <main id="main-content"></main>

  <footer>
    <div class="footer-logo">Galerie</div>
    <div class="footer-note">이미지 출처: Wikimedia Commons (Public Domain)</div>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-inner">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-image-side">
        <img id="modal-img" src="" alt="" referrerpolicy="no-referrer" />
        <div class="modal-image-overlay"></div>
      </div>
      <div class="modal-content-side">
        <div>
          <div class="modal-eyebrow" id="modal-museum"></div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-title-original" id="modal-title-original"></div>
        </div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="docent-section">
          <div class="docent-block">
            <div class="docent-label">한 줄 요약</div>
            <div class="docent-one-line" id="modal-one-line"></div>
          </div>
          <div class="docent-block">
            <div class="docent-label">작품 이야기</div>
            <div class="docent-story" id="modal-story"></div>
          </div>
          <div class="docent-block">
            <div class="docent-label">이것만은 찾아보자</div>
            <div class="docent-look-for" id="modal-look-for"></div>
          </div>
        </div>
        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  <script>
    // ── DATA (inlined from JSON) ──
    const DATA_URL = 'data.json';

    async function loadData() {
      try {
        const res = await fetch('data.json');
        return await res.json();
      } catch {
        // fallback: try same-origin
        return null;
      }
    }

    // ── RENDER ──
    function renderMuseumSection(museum, artworks, delay = 0) {
      const section = document.createElement('section');
      section.className = 'museum-section';
      section.dataset.museum = museum;

      section.innerHTML = `
        <div class="museum-header">
          <div class="museum-name">${museum}</div>
          <div class="museum-meta">Paris, France</div>
          <div class="museum-count">${artworks.length} works</div>
        </div>
        <div class="artwork-grid" id="grid-${museum}"></div>
      `;

      const grid = section.querySelector('.artwork-grid');

      artworks.forEach((work, i) => {
        const card = document.createElement('div');
        card.className = 'artwork-card';
        card.style.animationDelay = `${(delay + i) * 60}ms`;
        card.dataset.id = work.id;

        const isPriority = work.tags?.includes('필수');

        card.innerHTML = `
          <div class="card-image">
            <img src="${work.image_url}" alt="${work.title}" loading="lazy" referrerpolicy="no-referrer" />
            <div class="card-overlay">
              <div class="card-overlay-text">${work.docent.look_for.slice(0, 80)}…</div>
            </div>
            ${isPriority ? '<div class="card-priority">필수</div>' : ''}
          </div>
          <div class="card-body">
            <div class="card-artist">${work.artist}</div>
            <div class="card-title">${work.title}</div>
            <div class="card-title-original">${work.title_original} · ${work.year}</div>
            <div class="card-one-line">${work.docent.one_line}</div>
            <div class="card-tags">
              ${(work.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        `;

        card.addEventListener('click', () => openModal(work));
        grid.appendChild(card);
      });

      return section;
    }

    function renderAll(data, filter = 'all') {
      const main = document.getElementById('main-content');
      main.innerHTML = '';

      const museums = [...new Set(data.artworks.map(a => a.museum))];
      let delayOffset = 0;

      museums.forEach(museum => {
        const artworks = data.artworks.filter(a => a.museum === museum);
        const section = renderMuseumSection(museum, artworks, delayOffset);

        if (filter !== 'all' && museum !== filter) {
          section.classList.add('hidden');
        }

        main.appendChild(section);
        delayOffset += artworks.length;
      });
    }

    // ── FILTER ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        document.querySelectorAll('.museum-section').forEach(section => {
          if (filter === 'all' || section.dataset.museum === filter) {
            section.classList.remove('hidden');
          } else {
            section.classList.add('hidden');
          }
        });
      });
    });

    // ── MODAL ──
    function openModal(work) {
      document.getElementById('modal-img').src = work.image_url;
      document.getElementById('modal-img').alt = work.title;
      document.getElementById('modal-museum').textContent = `${work.museum} · ${work.style}`;
      document.getElementById('modal-title').textContent = work.title;
      document.getElementById('modal-title-original').textContent = `${work.title_original}`;
      document.getElementById('modal-one-line').textContent = work.docent.one_line;
      document.getElementById('modal-story').textContent = work.docent.story;
      document.getElementById('modal-look-for').textContent = work.docent.look_for;

      document.getElementById('modal-meta').innerHTML = `
        <div class="modal-meta-row">
          <span class="modal-meta-key">작가</span>
          <span class="modal-meta-val">${work.artist}</span>
        </div>
        <div class="modal-meta-row">
          <span class="modal-meta-key">제작연도</span>
          <span class="modal-meta-val">${work.year}</span>
        </div>
        <div class="modal-meta-row">
          <span class="modal-meta-key">양식</span>
          <span class="modal-meta-val">${work.style}</span>
        </div>
        <div class="modal-meta-row">
          <span class="modal-meta-key">소장처</span>
          <span class="modal-meta-val">${work.museum}, 파리</span>
        </div>
      `;

      document.getElementById('modal-tags').innerHTML =
        (work.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('modal-inner').scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── SCROLL HIDE HEADER (mobile) ──
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      if (window.innerWidth > 768) return;
      const current = window.scrollY;
      if (current > lastScroll && current > 80) {
        document.querySelector('header').classList.add('hide');
      } else {
        document.querySelector('header').classList.remove('hide');
      }
      lastScroll = current;
    }, { passive: true });

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ── INIT ──
    loadData().then(data => {
      if (data) {
        renderAll(data);
      } else {
        document.getElementById('main-content').innerHTML =
          '<p style="padding:48px;color:var(--muted)">data.json 파일을 같은 폴더에 위치시켜 주세요.</p>';
      }
    });
  </script>
</body>
</html>
