<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GALERIE — 세계 도시 가이드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+KR:wght@300;400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0b09; --bg-card: #131210; --bg-hover: #1a1815;
      --gold: #c9a84c; --gold-dim: #7a6330;
      --cream: #e8e0d0; --muted: #5a5650; --border: #252320; --tag-bg: #1e1c18;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--cream); font-family:'DM Sans','Noto Sans KR',sans-serif; font-weight:300; min-height:100vh; word-break:keep-all; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; opacity:0.4; }

    /* ── GNB ── */
    header { position:sticky; top:0; z-index:100; background:rgba(12,11,9,0.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 48px; height:64px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; letter-spacing:0.3em; color:var(--gold); text-transform:uppercase; cursor:pointer; }
    .logo:hover { opacity:0.8; }
    .breadcrumb { display:none; align-items:center; gap:7px; font-size:11px; color:var(--muted); }
    .breadcrumb.visible { display:flex; }
    .bc-sep { color:var(--border); }
    .bc-city { color:var(--cream); }
    .bc-home { cursor:pointer; transition:color 0.2s; }
    .bc-home:hover { color:var(--gold); }

    /* ── PAGES ── */
    .page { display:none; }
    .page.active { display:block; }

    /* ════════════════════════════════
       LANDING
    ════════════════════════════════ */
    .landing-hero { padding:100px 48px 56px; max-width:860px; }
    .landing-eyebrow { font-size:10px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); margin-bottom:24px; display:flex; align-items:center; gap:12px; }
    .landing-eyebrow::after { content:''; width:48px; height:1px; background:var(--gold-dim); }
    .landing-h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,4.5vw,56px); font-weight:300; line-height:1.0; color:var(--cream); margin-bottom:20px; }
    .landing-h1 em { font-style:normal; color:var(--gold); }
    .landing-desc { font-size:15px; line-height:1.8; color:var(--muted); max-width:440px; font-family:'Noto Serif KR',serif; font-weight:300; }
    .city-grid { padding:0 48px 80px; display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
    .city-card { position:relative; cursor:pointer; overflow:hidden; background:var(--bg-card); aspect-ratio:3/4; display:flex; flex-direction:column; justify-content:flex-end; animation:fadeUp 0.6s ease both; }
    .city-card:nth-child(1){animation-delay:0ms} .city-card:nth-child(2){animation-delay:80ms} .city-card:nth-child(3){animation-delay:160ms}
    .city-card-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:brightness(0.65) saturate(1.05); transition:transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.4s; }
    .city-card:hover .city-card-bg { transform:scale(1.04); filter:brightness(0.82) saturate(1.2); }
    .city-card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(8,7,6,0.97) 0%,rgba(8,7,6,0.6) 40%,transparent 100%); }
    .city-card-content { position:relative; z-index:1; padding:28px 28px 32px; }
    .cc-num { font-family:'Cormorant Garamond',serif; font-size:64px; font-weight:300; color:rgba(201,168,76,0.22); line-height:1; margin-bottom:-12px; display:block; }
    .cc-country { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
    .cc-name { font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:300; color:#fff; line-height:1; margin-bottom:8px; }
    .cc-sub { font-size:11px; color:rgba(232,224,208,0.7); font-family:'Noto Serif KR',serif; margin-bottom:18px; }
    .cc-cta { display:inline-flex; align-items:center; gap:8px; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); border-bottom:1px solid var(--gold-dim); padding-bottom:2px; transition:all 0.2s; }
    .city-card:hover .cc-cta { border-color:var(--gold); gap:12px; }
    .landing-stats { padding:28px 48px 72px; display:flex; gap:48px; border-top:1px solid var(--border); margin:0 48px; }
    .stat-num { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:300; color:var(--gold); }
    .stat-label { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-top:2px; }

    /* ════════════════════════════════
       CITY SHELL
    ════════════════════════════════ */
    .city-bar { background:var(--bg-card); border-bottom:1px solid var(--border); padding:0 48px; height:48px; display:flex; align-items:center; gap:16px; }
    .back-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 14px; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .back-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
    .city-bar-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; color:var(--cream); }
    .city-bar-name span { color:var(--muted); font-size:12px; margin-left:8px; font-family:'DM Sans',sans-serif; }
    .tab-bar { display:flex; border-bottom:1px solid var(--border); padding:0 48px; background:var(--bg-card); }
    .tab-btn { background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); padding:15px 22px; font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; transition:color 0.2s; margin-bottom:-1px; }
    .tab-btn:hover { color:var(--cream); }
    .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ════════════════════════════════
       TAB 1 — 도시 이야기
    ════════════════════════════════ */
    .story-body { padding:52px 48px 80px; display:grid; grid-template-columns:1.4fr 1fr; gap:52px; align-items:start; max-width:1100px; }
    .story-col { display:flex; flex-direction:column; gap:44px; }
    .sec-label { font-size:9px; letter-spacing:0.38em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:22px; display:flex; align-items:center; gap:12px; }
    .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .story-timeline { list-style:none; padding-left:24px; border-left:1px solid var(--border); display:flex; flex-direction:column; gap:26px; }
    .tl-item { position:relative; }
    .tl-item::before { content:''; position:absolute; left:-30px; top:6px; width:5px; height:5px; background:var(--gold-dim); border-radius:50%; }
    .tl-year { font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--gold); letter-spacing:0.1em; margin-bottom:5px; }
    .tl-event { font-size:13px; line-height:1.8; color:rgba(232,224,208,0.58); font-family:'Noto Serif KR',serif; font-weight:300; }
    .origin-card { background:var(--bg-card); border:1px solid var(--border); padding:24px 26px; display:grid; grid-template-columns:auto 1fr; gap:22px; align-items:start; }
    .origin-word { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; color:var(--gold); line-height:1; }
    .origin-lang { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-top:5px; }
    .origin-desc { font-size:13px; line-height:1.9; color:rgba(232,224,208,0.58); font-family:'Noto Serif KR',serif; font-weight:300; }
    .famous-grid { display:flex; flex-direction:column; gap:2px; }
    .famous-card { background:var(--bg-card); border:1px solid var(--border); padding:15px 18px; }
    .famous-name { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:300; color:var(--cream); margin-bottom:3px; }
    .famous-field { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:7px; }
    .famous-desc { font-size:12px; line-height:1.75; color:var(--muted); font-family:'Noto Serif KR',serif; font-weight:300; }
    .trivia-list { display:flex; flex-direction:column; gap:2px; }
    .trivia-item { background:var(--bg-card); border:1px solid var(--border); padding:14px 20px; display:grid; grid-template-columns:26px 1fr; gap:14px; align-items:start; }
    .trivia-num { font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--gold-dim); line-height:1.5; }
    .trivia-text { font-size:13px; line-height:1.85; color:rgba(232,224,208,0.58); font-family:'Noto Serif KR',serif; font-weight:300; }
    .panel-empty { padding:60px 48px; font-size:13px; color:var(--muted); }

    /* ════════════════════════════════
       TAB 2 — 명소 그리드
    ════════════════════════════════ */
    .landmarks-grid { padding:40px 48px 80px; display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2px; }
    .landmark-card { background:var(--bg-card); border:1px solid var(--border); cursor:pointer; overflow:hidden; transition:background 0.25s; animation:fadeUp 0.5s ease both; }
    .landmark-card:hover { background:var(--bg-hover); }
    .landmark-card:hover .lm-img-inner { transform:scale(1.04); }
    .lm-img-wrap { aspect-ratio:16/9; overflow:hidden; position:relative; background:var(--bg-hover); }
    .lm-img-inner { width:100%; height:100%; object-fit:cover; filter:brightness(0.75) saturate(0.9); transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .lm-cat { position:absolute; bottom:10px; left:12px; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); background:rgba(12,11,9,0.84); padding:3px 8px; }
    .lm-card-body { padding:16px 18px 20px; display:flex; flex-direction:column; gap:8px; }
    .lm-card-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:300; color:var(--cream); line-height:1.2; }
    .lm-card-one-line { font-size:12px; line-height:1.65; color:rgba(232,224,208,0.45); font-family:'Noto Serif KR',serif; font-weight:300; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .lm-card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }

    /* ════════════════════════════════
       LANDMARK DETAIL
    ════════════════════════════════ */
    .lm-detail-page { padding:44px 48px 80px; animation:fadeUp 0.4s ease both; }
    .lm-detail-back { background:transparent; border:1px solid var(--border); color:var(--muted); padding:6px 14px; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; margin-bottom:36px; display:inline-block; }
    .lm-detail-back:hover { border-color:var(--gold-dim); color:var(--gold); }
    .lm-detail-eyebrow { font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:10px; }
    .lm-detail-title { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,4vw,46px); font-weight:300; color:var(--cream); line-height:1.05; margin-bottom:6px; }
    .lm-detail-title-en { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px; color:var(--muted); margin-bottom:32px; }
    .lm-detail-image { width:100%; max-height:420px; object-fit:cover; filter:brightness(0.78) saturate(0.88); display:block; margin-bottom:44px; }
    .lm-detail-body { display:grid; grid-template-columns:1.65fr 1fr; gap:52px; align-items:start; }
    .lm-detail-left { display:flex; flex-direction:column; gap:32px; }
    .docent-block { display:flex; flex-direction:column; gap:10px; }
    .docent-label { font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold-dim); display:flex; align-items:center; gap:8px; }
    .docent-label::after { content:''; flex:1; height:1px; background:var(--border); }
    .docent-one-line { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:19px; line-height:1.5; color:var(--cream); }
    .docent-story { font-size:13px; line-height:2.0; color:rgba(232,224,208,0.65); font-family:'Noto Serif KR',serif; font-weight:300; }
    .docent-look-for { font-size:12px; line-height:1.85; color:rgba(201,168,76,0.75); font-family:'Noto Serif KR',serif; font-weight:300; padding:14px 18px; border-left:2px solid var(--gold-dim); background:rgba(201,168,76,0.04); }
    .lm-detail-right { display:flex; flex-direction:column; gap:14px; }
    .info-block { background:var(--bg-card); border:1px solid var(--border); padding:18px 20px; }
    .info-block-title { font-size:9px; letter-spacing:0.28em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
    .info-row { display:flex; justify-content:space-between; margin-bottom:9px; }
    .info-row:last-child { margin-bottom:0; }
    .info-key { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
    .info-val { color:var(--cream); font-family:'Noto Serif KR',serif; font-weight:300; text-align:right; font-size:11px; }
    .map-mini { background:var(--bg-card); border:1px solid var(--border); height:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; position:relative; overflow:hidden; }
    .map-pin { width:8px; height:8px; background:var(--gold); border-radius:50%; position:relative; z-index:1; }
    .map-pin::after { content:''; position:absolute; inset:-4px; border:1px solid rgba(201,168,76,0.35); border-radius:50%; }
    .map-place { font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); position:relative; z-index:1; }
    /* products */
    .products-block { border:1px solid var(--border); overflow:hidden; }
    .products-block-header { padding:11px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .products-block-title { font-size:9px; letter-spacing:0.28em; text-transform:uppercase; color:var(--muted); }
    .products-block-count { font-size:9px; color:rgba(90,86,80,0.5); }
    .product-item { display:flex; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.18s; text-decoration:none; }
    .product-item:last-of-type { border-bottom:none; }
    .product-item:hover { background:var(--bg-hover); }
    .product-thumb { width:58px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg-hover); }
    .product-thumb-icon { font-family:'Cormorant Garamond',serif; font-size:20px; color:rgba(201,168,76,0.25); }
    .product-info { padding:10px 12px; flex:1; min-width:0; }
    .product-name { font-size:11px; color:var(--cream); line-height:1.4; margin-bottom:3px; font-family:'Noto Serif KR',serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .product-meta { font-size:9px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; }
    .product-price-row { display:flex; align-items:center; justify-content:space-between; }
    .product-price { font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--gold); }
    .product-arr { font-size:10px; color:var(--gold-dim); }
    .products-partner-note { padding:8px 14px; font-size:9px; color:rgba(90,86,80,0.4); line-height:1.6; border-top:1px solid var(--border); }
    /* tags */
    .tag { background:var(--tag-bg); border:1px solid var(--border); color:var(--muted); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; padding:3px 8px; }
    .tag-row { display:flex; flex-wrap:wrap; gap:4px; }

    /* ════════════════════════════════
       TAB 3 — 미술관 도슨트
    ════════════════════════════════ */
    .museum-intro { padding:44px 48px 40px; border-bottom:1px solid var(--border); display:flex; align-items:baseline; justify-content:space-between; gap:24px; }
    .museum-intro-tag { font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:12px; }
    .museum-intro-city { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,4vw,44px); font-weight:300; line-height:1.0; color:var(--cream); }
    .museum-intro-city em { font-style:italic; color:var(--gold); margin-left:12px; font-size:0.85em; }
    .museum-intro-right { text-align:right; flex-shrink:0; }
    .museum-intro-count { font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:300; color:var(--gold); line-height:1; }
    .museum-intro-count-label { font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
    .museum-section { padding:56px 48px 72px; }
    .museum-header { display:flex; align-items:baseline; gap:20px; margin-bottom:36px; padding-bottom:18px; border-bottom:1px solid var(--border); }
    .museum-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; letter-spacing:0.05em; color:var(--cream); }
    .museum-meta { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
    .museum-count { margin-left:auto; font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--gold-dim); }
    .artwork-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2px; }
    .artwork-card { background:var(--bg-card); cursor:pointer; transition:background 0.3s; overflow:hidden; animation:fadeUp 0.5s ease both; }
    .artwork-card:hover { background:var(--bg-hover); }
    .artwork-card:hover .card-image img { transform:scale(1.04); }
    .artwork-card:hover .card-overlay { opacity:1; }
    .card-image { position:relative; aspect-ratio:4/3; overflow:hidden; background:#1a1815; }
    .card-image img { width:100%; height:100%; object-fit:cover; transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); filter:saturate(0.85) brightness(0.9); }
    .card-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(12,11,9,0.9) 0%,transparent 60%); opacity:0; transition:opacity 0.3s; display:flex; align-items:flex-end; padding:18px; }
    .card-overlay-text { font-size:11px; line-height:1.6; color:rgba(232,224,208,0.8); font-family:'Noto Serif KR',serif; font-weight:300; }
    .card-priority { position:absolute; top:12px; right:12px; background:var(--gold); color:var(--bg); font-size:9px; letter-spacing:0.2em; text-transform:uppercase; padding:4px 8px; font-weight:500; }
    .card-body { padding:18px 20px 22px; }
    .card-artist { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px; }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:400; line-height:1.25; color:var(--cream); margin-bottom:3px; }
    .card-title-original { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; color:var(--muted); margin-bottom:12px; }
    .card-one-line { font-size:11px; line-height:1.65; color:rgba(232,224,208,0.5); font-family:'Noto Serif KR',serif; font-weight:300; margin-bottom:14px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-tags { display:flex; flex-wrap:wrap; gap:4px; }

    /* ════════════════════════════════
       MODAL
    ════════════════════════════════ */
    .modal-overlay { position:fixed; inset:0; background:rgba(8,7,6,0.92); z-index:1000; display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(8px); }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--bg-card); border:1px solid var(--border); max-width:960px; width:100%; max-height:90vh; overflow-y:auto; display:grid; grid-template-columns:1fr 1fr; transform:translateY(20px); transition:transform 0.3s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal::-webkit-scrollbar { width:4px; } .modal::-webkit-scrollbar-track { background:var(--bg); } .modal::-webkit-scrollbar-thumb { background:var(--gold-dim); }
    .modal-image-side { position:relative; background:#0f0e0c; }
    .modal-image-side img { width:100%; height:100%; object-fit:cover; filter:saturate(0.9) brightness(0.85); min-height:400px; }
    .modal-image-overlay { position:absolute; inset:0; background:linear-gradient(135deg,transparent 60%,rgba(12,11,9,0.5)); }
    .modal-content-side { padding:44px 36px; display:flex; flex-direction:column; gap:26px; }
    .modal-close { position:absolute; top:18px; right:18px; background:transparent; border:1px solid var(--border); color:var(--muted); width:34px; height:34px; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; z-index:10; }
    .modal-close:hover { border-color:var(--gold-dim); color:var(--gold); }
    .modal-eyebrow { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); }
    .modal-title { font-family:'Cormorant Garamond',serif; font-size:34px; font-weight:300; line-height:1.15; color:var(--cream); }
    .modal-title-original { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:15px; color:var(--muted); margin-top:4px; }
    .modal-meta { display:flex; flex-direction:column; gap:6px; padding:18px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .modal-meta-row { display:flex; justify-content:space-between; font-size:12px; }
    .modal-meta-key { letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-size:10px; }
    .modal-meta-val { color:var(--cream); font-family:'Noto Serif KR',serif; font-weight:300; }
    .docent-section { display:flex; flex-direction:column; gap:18px; }
    .docent-one-line-modal { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:17px; line-height:1.5; color:var(--cream); }
    .docent-story-modal { font-size:12px; line-height:1.9; color:rgba(232,224,208,0.7); font-family:'Noto Serif KR',serif; font-weight:300; }
    .docent-look-for-modal { font-size:12px; line-height:1.8; color:rgba(201,168,76,0.75); font-family:'Noto Serif KR',serif; font-weight:300; padding:13px 15px; border-left:2px solid var(--gold-dim); background:rgba(201,168,76,0.04); }
    .modal-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:auto; }

    /* ── FOOTER ── */
    footer { padding:44px 48px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .footer-logo { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; letter-spacing:0.3em; color:var(--gold-dim); text-transform:uppercase; }
    .footer-note { font-size:11px; color:var(--muted); letter-spacing:0.1em; }

    /* ── UTILS ── */
    ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* ── RESPONSIVE ── */
    @media (max-width:900px) {
      .city-grid { grid-template-columns:1fr; padding:0 20px 60px; }
      .city-card { aspect-ratio:16/9; }
      .story-body { grid-template-columns:1fr; padding:32px 20px 60px; gap:40px; }
      .landmarks-grid { padding:24px 20px 60px; }
      .lm-detail-page { padding:28px 20px 60px; }
      .lm-detail-body { grid-template-columns:1fr; gap:32px; }
      .museum-section { padding:32px 20px 56px; }
      .artwork-grid { grid-template-columns:1fr 1fr; }
      footer { padding:28px 20px; flex-direction:column; gap:10px; text-align:center; }
    }
    @media (max-width:768px) {
      header { padding:0 20px; }
      .logo { font-size:18px; }
      .breadcrumb { display:none !important; }
      .city-bar { padding:0 20px; }
      .tab-bar { padding:0 20px; overflow-x:auto; }
      .tab-btn { padding:13px 14px; font-size:10px; white-space:nowrap; }
      .landing-hero { padding:60px 20px 40px; }
      .landing-stats { margin:0 20px; padding:20px 0 52px; gap:28px; }
      .museum-intro { padding:24px 20px; flex-direction:column; align-items:flex-start; }
      .modal { grid-template-columns:1fr; max-height:88vh; }
      .modal-image-side img { min-height:220px; max-height:280px; }
      .modal-content-side { padding:24px 20px; }
    }
  </style>
</head>
<body>

  <!-- ════ GNB ════ -->
  <header>
    <div class="logo" id="logo-btn">Galerie</div>
    <div class="breadcrumb" id="breadcrumb">
      <span class="bc-home" id="bc-home">전체 도시</span>
      <span class="bc-sep">›</span>
      <span class="bc-city" id="bc-city"></span>
      <span class="bc-sep" id="bc-sep2">›</span>
      <span id="bc-current"></span>
    </div>
  </header>

  <!-- ════ LANDING ════ -->
  <div id="page-landing" class="page active">
    <div class="landing-hero">
      <div class="landing-eyebrow">세계 · 도시 가이드</div>
      <h1 class="landing-h1">도시를 읽는<br><em>새로운 감각</em></h1>
      <p class="landing-desc">역사, 지명, 명소, 미술관까지 — 여행 전에 알면 도시가 달리 보이는 풀 패키지 도슨트</p>
    </div>
    <div class="city-grid" id="city-grid"></div>
    <div class="landing-stats" id="landing-stats">
      <div><div class="stat-num" id="stat-cities">—</div><div class="stat-label">도시</div></div>
      <div><div class="stat-num" id="stat-museums">—</div><div class="stat-label">미술관</div></div>
      <div><div class="stat-num" id="stat-works">—</div><div class="stat-label">작품</div></div>
    </div>
    <footer>
      <div class="footer-logo">Galerie</div>
      <div class="footer-note">이미지 출처: Wikimedia Commons / Public Domain</div>
    </footer>
  </div>

  <!-- ════ CITY PAGE ════ -->
  <div id="page-city" class="page">
    <div class="city-bar">
      <button class="back-btn" id="back-btn">← 도시 선택</button>
      <div class="city-bar-name" id="city-bar-name"></div>
    </div>
    <nav class="tab-bar" id="tab-bar"></nav>
    <div id="tab-story"     class="tab-panel"></div>
    <div id="tab-landmarks" class="tab-panel"></div>
    <div id="tab-museums"   class="tab-panel"></div>
    <footer>
      <div class="footer-logo">Galerie</div>
      <div class="footer-note">이미지 출처: Wikimedia Commons / Public Domain</div>
    </footer>
  </div>

  <!-- ════ MODAL ════ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-inner">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-image-side">
        <img id="modal-img" src="" alt="" />
        <div class="modal-image-overlay"></div>
      </div>
      <div class="modal-content-side">
        <div>
          <div class="modal-eyebrow" id="modal-museum"></div>
          <div class="modal-title"   id="modal-title"></div>
          <div class="modal-title-original" id="modal-title-original"></div>
        </div>
        <div class="modal-meta" id="modal-meta"></div>
        <div class="docent-section">
          <div class="docent-block">
            <div class="docent-label">한 줄 요약</div>
            <div class="docent-one-line-modal" id="modal-one-line"></div>
          </div>
          <div class="docent-block">
            <div class="docent-label">작품 이야기</div>
            <div class="docent-story-modal" id="modal-story"></div>
          </div>
          <div class="docent-block">
            <div class="docent-label">이것만은 찾아보자</div>
            <div class="docent-look-for-modal" id="modal-look-for"></div>
          </div>
        </div>
        <div class="modal-tags" id="modal-tags"></div>
      </div>
    </div>
  </div>

  <script>
  /* ══════════════════════════════════════
     CITY CONFIG
  ══════════════════════════════════════ */
  const CITIES = [
    { id:'paris',     name:'파리',      nameEn:'Paris',     country:'프랑스',  file:'paris.json',
      desc:'루브르 · 오르세 · 에펠탑',
      cardBg:'https://res.cloudinary.com/do5tz8aun/image/upload/paris-card.jpg' },
    { id:'amsterdam', name:'암스테르담', nameEn:'Amsterdam', country:'네덜란드', file:'amsterdam.json',
      desc:'반 고흐 미술관 · 라익스뮤지엄',
      cardBg:'https://res.cloudinary.com/do5tz8aun/image/upload/amsterdam-card.jpg' },
    { id:'newyork',   name:'뉴욕',      nameEn:'New York',  country:'미국',    file:'newyork.json',
      desc:'메트 · MoMA · 구겐하임',
      cardBg:'https://res.cloudinary.com/do5tz8aun/image/upload/newyork-card.jpg' },
  ];

  /* ══════════════════════════════════════
     STATE
  ══════════════════════════════════════ */
  const cache = {};
  let currentCity = null;
  let currentData = null;

  /* ══════════════════════════════════════
     ROUTER
  ══════════════════════════════════════ */
  function parseHash() {
    const raw = location.hash.replace(/^#\/?/, '');
    return raw ? raw.split('/') : [];
  }

  async function route() {
    const parts    = parseHash();
    const cityId   = parts[0] || '';
    const tabSlug  = parts[1] || 'story';
    const detailId = parts[2] || null;

    if (!cityId) { showLanding(); return; }

    const cityConfig = CITIES.find(c => c.id === cityId);
    if (!cityConfig) { showLanding(); return; }

    if (!cache[cityConfig.id]) {
      try {
        const res = await fetch(cityConfig.file);
        cache[cityConfig.id] = await res.json();
      } catch(e) {
        alert(`${cityConfig.name} 데이터를 불러올 수 없습니다.`);
        showLanding(); return;
      }
    }

    currentCity = cityConfig;
    currentData = cache[cityConfig.id];
    showCityPage(cityConfig, tabSlug, detailId);
  }

  function go(path) { location.hash = '/' + path; }

  window.addEventListener('hashchange', route);

  /* ══════════════════════════════════════
     LANDING
  ══════════════════════════════════════ */
  function showLanding() {
    switchPage('landing');
    setBreadcrumb(null);
    const grid = document.getElementById('city-grid');
    grid.innerHTML = '';
    CITIES.forEach((city, i) => {
      const card = document.createElement('div');
      card.className = 'city-card';
      card.style.animationDelay = `${i * 80}ms`;
      card.innerHTML = `
        <div class="city-card-bg" style="background-image:url('${city.cardBg}')"></div>
        <div class="city-card-overlay"></div>
        <div class="city-card-content">
          <span class="cc-num">0${i+1}</span>
          <div class="cc-country">${city.country}</div>
          <div class="cc-name">${city.name}</div>
          <div class="cc-sub">${city.desc}</div>
          <div class="cc-cta">탐험하기 →</div>
        </div>`;
      card.addEventListener('click', () => go(city.id));
      grid.appendChild(card);
    });
    document.getElementById('stat-cities').textContent = CITIES.length;
    let totalM = 0, totalW = 0;
    Object.values(cache).forEach(d => {
      totalM += new Set(d.artworks?.map(a=>a.museum)||[]).size;
      totalW += d.artworks?.length || 0;
    });
    document.getElementById('stat-museums').textContent = totalM || '—';
    document.getElementById('stat-works').textContent   = totalW || '—';
  }

  /* ══════════════════════════════════════
     CITY PAGE
  ══════════════════════════════════════ */
  function showCityPage(cityConfig, tabSlug, detailId) {
    switchPage('city');
    window.scrollTo({ top:0 });

    // city bar
    document.getElementById('city-bar-name').innerHTML =
      `${cityConfig.name} <span>${cityConfig.nameEn}, ${cityConfig.country}</span>`;

    // build tab bar
    buildTabBar(cityConfig, currentData);

    // render all panels fresh
    renderStory(currentData);
    renderLandmarks(currentData, tabSlug === 'landmarks' ? detailId : null);
    renderMuseums(cityConfig, currentData);

    // activate tab
    activateTab(tabSlug);

    // breadcrumb
    setBreadcrumb(cityConfig, tabSlug, detailId);
  }

  function buildTabBar(cityConfig, data) {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';
    const hasMuseums = !!data?.artworks?.length;
    const tabs = [
      { slug:'story',     label:'도시 이야기' },
      { slug:'landmarks', label:'명소 도슨트' },
      ...(hasMuseums ? [{ slug:'museums', label:'미술관 도슨트' }] : []),
    ];
    tabs.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.textContent = t.label;
      btn.dataset.tab = t.slug;
      btn.addEventListener('click', () => go(`${cityConfig.id}/${t.slug}`));
      bar.appendChild(btn);
    });
  }

  function activateTab(slug) {
    document.querySelectorAll('.tab-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.tab === slug));
    ['story','landmarks','museums'].forEach(id =>
      document.getElementById(`tab-${id}`).classList.toggle('active', id === slug));
  }

  /* ══════════════════════════════════════
     PANEL: 도시 이야기
  ══════════════════════════════════════ */
  function renderStory(data) {
    const el = document.getElementById('tab-story');
    const ci = data?.city_info;
    if (!ci) { el.innerHTML = `<p class="panel-empty">이 도시의 이야기 콘텐츠가 준비 중입니다.</p>`; return; }

    let L = '', R = '';

    if (ci.timeline?.length) {
      L += `<div><div class="sec-label">역사 타임라인</div><ul class="story-timeline">
        ${ci.timeline.map(t=>`<li class="tl-item"><div class="tl-year">${t.year}</div><div class="tl-event">${t.event}</div></li>`).join('')}
      </ul></div>`;
    }
    if (ci.name_origin) {
      const n = ci.name_origin;
      L += `<div><div class="sec-label">지명의 유래</div>
        <div class="origin-card">
          <div><div class="origin-word">${n.word}</div><div class="origin-lang">${n.language}</div></div>
          <div class="origin-desc">${n.description}</div>
        </div></div>`;
    }
    if (ci.famous_people?.length) {
      R += `<div><div class="sec-label">이 도시가 낳은 인물</div><div class="famous-grid">
        ${ci.famous_people.map(p=>`<div class="famous-card"><div class="famous-name">${p.name}</div><div class="famous-field">${p.field}</div><div class="famous-desc">${p.description}</div></div>`).join('')}
      </div></div>`;
    }
    if (ci.trivia?.length) {
      R += `<div><div class="sec-label">알아두면 재밌는 사실</div><div class="trivia-list">
        ${ci.trivia.map((t,i)=>`<div class="trivia-item"><div class="trivia-num">0${i+1}</div><div class="trivia-text">${t}</div></div>`).join('')}
      </div></div>`;
    }

    el.innerHTML = `<div class="story-body"><div class="story-col">${L}</div><div class="story-col">${R}</div></div>`;
  }

  /* ══════════════════════════════════════
     PANEL: 명소 도슨트
  ══════════════════════════════════════ */
  function renderLandmarks(data, detailId) {
    if (detailId) {
      const lm = data?.landmarks?.find(l => l.id === detailId);
      if (lm) { renderLandmarkDetail(lm); return; }
    }
    renderLandmarkGrid(data);
  }

  function renderLandmarkGrid(data) {
    const el = document.getElementById('tab-landmarks');
    if (!data?.landmarks?.length) {
      el.innerHTML = `<p class="panel-empty">이 도시의 명소 도슨트가 준비 중입니다.</p>`; return;
    }
    el.innerHTML = `<div class="landmarks-grid">
      ${data.landmarks.map((lm,i)=>`
        <div class="landmark-card" data-id="${lm.id}" style="animation-delay:${i*55}ms">
          <div class="lm-img-wrap">
            ${lm.image_url
              ? `<img class="lm-img-inner" src="${lm.image_url}" alt="${lm.name}" loading="lazy">`
              : `<div class="lm-img-inner" style="background:var(--bg-hover)"></div>`}
            <div class="lm-cat">${lm.category}</div>
          </div>
          <div class="lm-card-body">
            <div class="lm-card-name">${lm.name}</div>
            <div class="lm-card-one-line">${lm.docent.one_line}</div>
            <div class="lm-card-tags">${(lm.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </div>`).join('')}
    </div>`;
    el.querySelectorAll('.landmark-card').forEach(card =>
      card.addEventListener('click', () => go(`${currentCity.id}/landmarks/${card.dataset.id}`)));
  }

  function renderLandmarkDetail(lm) {
    const el = document.getElementById('tab-landmarks');
    const d  = lm.docent;

    const tipsHtml = lm.tips
      ? `<div class="info-block"><div class="info-block-title">방문 정보</div>
          ${Object.entries(lm.tips).map(([k,v])=>`<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('')}
        </div>` : '';

    const mapHtml = lm.map_label
      ? `<div class="map-mini">
          <svg style="position:absolute;inset:0;opacity:.09" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            <defs><pattern id="mg" width="16" height="16" patternUnits="userSpaceOnUse"><path d="M16 0L0 0 0 16" fill="none" stroke="#c9a84c" stroke-width=".5"/></pattern></defs>
            <rect width="100%" height="100%" fill="url(#mg)"/>
            <line x1="0" y1="60" x2="400" y2="60" stroke="#c9a84c" stroke-width="1.5" opacity=".8"/>
            <line x1="80" y1="0" x2="80" y2="120" stroke="#c9a84c" stroke-width="1.5" opacity=".8"/>
          </svg>
          <div class="map-pin"></div>
          <div class="map-place">${lm.map_label}</div>
        </div>` : '';

    const productsHtml = lm.products?.length
      ? `<div class="products-block">
          <div class="products-block-header">
            <span class="products-block-title">추천 여행 상품</span>
            <span class="products-block-count">${lm.products.length}개</span>
          </div>
          ${lm.products.map(p=>`
            <a class="product-item" href="${p.url||'#'}" target="_blank" rel="noopener">
              <div class="product-thumb"><div class="product-thumb-icon">✦</div></div>
              <div class="product-info">
                <div class="product-name">${p.name}</div>
                <div class="product-meta">${p.meta||''}</div>
                <div class="product-price-row">
                  <span class="product-price">${p.price||''}</span>
                  <span class="product-arr">↗</span>
                </div>
              </div>
            </a>`).join('')}
          <div class="products-partner-note">파트너 링크를 통한 예약 시 소정의 수수료가 발생할 수 있습니다.</div>
        </div>` : '';

    const tagsHtml = lm.tags?.length
      ? `<div class="tag-row">${lm.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';

    el.innerHTML = `<div class="lm-detail-page">
      <button class="lm-detail-back" id="lm-back">← 명소 목록</button>
      <div class="lm-detail-eyebrow">${lm.category}${lm.district?' · '+lm.district:''}</div>
      <div class="lm-detail-title">${lm.name}</div>
      <div class="lm-detail-title-en">${[lm.name_en, lm.year].filter(Boolean).join(' · ')}</div>
      ${lm.image_url?`<img class="lm-detail-image" src="${lm.image_url}" alt="${lm.name}">`:''}
      <div class="lm-detail-body">
        <div class="lm-detail-left">
          <div class="docent-block">
            <div class="docent-label">한 줄 요약</div>
            <div class="docent-one-line">${d.one_line}</div>
          </div>
          ${d.history_story?`<div class="docent-block"><div class="docent-label">역사 이야기</div><div class="docent-story">${d.history_story}</div></div>`:''}
          ${d.art_story?`<div class="docent-block"><div class="docent-label">건축 · 미술 포인트</div><div class="docent-story">${d.art_story}</div></div>`:''}
          ${d.look_for?`<div class="docent-block"><div class="docent-label">이것만은 찾아보자</div><div class="docent-look-for">${d.look_for}</div></div>`:''}
        </div>
        <div class="lm-detail-right">
          ${tipsHtml}${mapHtml}${productsHtml}${tagsHtml}
        </div>
      </div>
    </div>`;

    document.getElementById('lm-back').addEventListener('click', () =>
      go(`${currentCity.id}/landmarks`));
  }

  /* ══════════════════════════════════════
     PANEL: 미술관 도슨트
  ══════════════════════════════════════ */
  function renderMuseums(cityConfig, data) {
    const el = document.getElementById('tab-museums');
    if (!data?.artworks?.length) { el.innerHTML = ''; return; }

    const museums = [...new Set(data.artworks.map(a => a.museum))];
    let html = `<div class="museum-intro">
      <div>
        <div class="museum-intro-tag">${cityConfig.name} · ${museums.length}개 미술관</div>
        <div class="museum-intro-city">${cityConfig.name}<em>${cityConfig.nameEn}</em></div>
      </div>
      <div class="museum-intro-right">
        <div class="museum-intro-count">${data.artworks.length}</div>
        <div class="museum-intro-count-label">작품 수록</div>
      </div>
    </div>`;

    museums.forEach(museum => {
      const works = data.artworks.filter(a => a.museum === museum);
      html += `<section class="museum-section">
        <div class="museum-header">
          <div class="museum-name">${museum}</div>
          <div class="museum-meta">${cityConfig.name}</div>
          <div class="museum-count">${works.length} works</div>
        </div>
        <div class="artwork-grid">
          ${works.map((w,i)=>`
            <div class="artwork-card" data-id="${w.id}" style="animation-delay:${i*55}ms">
              <div class="card-image">
                <img src="${w.image_url}" alt="${w.title}" loading="lazy">
                <div class="card-overlay"><div class="card-overlay-text">${w.docent.look_for.slice(0,80)}…</div></div>
                ${w.tags?.includes('필수')?'<div class="card-priority">필수</div>':''}
              </div>
              <div class="card-body">
                <div class="card-artist">${w.artist}</div>
                <div class="card-title">${w.title}</div>
                <div class="card-title-original">${w.title_original} · ${w.year}</div>
                <div class="card-one-line">${w.docent.one_line}</div>
                <div class="card-tags">${(w.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
              </div>
            </div>`).join('')}
        </div>
      </section>`;
    });

    el.innerHTML = html;
    el.querySelectorAll('.artwork-card').forEach(card => {
      const work = data.artworks.find(a => a.id === card.dataset.id);
      if (work) card.addEventListener('click', () => openModal(work));
    });
  }

  /* ══════════════════════════════════════
     MODAL
  ══════════════════════════════════════ */
  function openModal(work) {
    document.getElementById('modal-img').src = work.image_url;
    document.getElementById('modal-img').alt = work.title;
    document.getElementById('modal-museum').textContent = `${work.museum} · ${work.style}`;
    document.getElementById('modal-title').textContent  = work.title;
    document.getElementById('modal-title-original').textContent = work.title_original;
    document.getElementById('modal-one-line').textContent  = work.docent.one_line;
    document.getElementById('modal-story').textContent     = work.docent.story;
    document.getElementById('modal-look-for').textContent  = work.docent.look_for;
    document.getElementById('modal-meta').innerHTML = `
      <div class="modal-meta-row"><span class="modal-meta-key">작가</span><span class="modal-meta-val">${work.artist}</span></div>
      <div class="modal-meta-row"><span class="modal-meta-key">제작연도</span><span class="modal-meta-val">${work.year}</span></div>
      <div class="modal-meta-row"><span class="modal-meta-key">양식</span><span class="modal-meta-val">${work.style}</span></div>
      <div class="modal-meta-row"><span class="modal-meta-key">소장처</span><span class="modal-meta-val">${work.museum}, ${work.city}</span></div>`;
    document.getElementById('modal-tags').innerHTML =
      (work.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-inner').scrollTop = 0;
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  /* ══════════════════════════════════════
     BREADCRUMB
  ══════════════════════════════════════ */
  const TAB_LABELS = { story:'도시 이야기', landmarks:'명소 도슨트', museums:'미술관 도슨트' };

  function setBreadcrumb(cityConfig, tabSlug, detailId) {
    const bc   = document.getElementById('breadcrumb');
    const sep2 = document.getElementById('bc-sep2');
    const cur  = document.getElementById('bc-current');
    if (!cityConfig) { bc.classList.remove('visible'); return; }
    bc.classList.add('visible');
    document.getElementById('bc-city').textContent = cityConfig.name;
    if (detailId && tabSlug === 'landmarks') {
      const lm = cache[cityConfig.id]?.landmarks?.find(l=>l.id===detailId);
      sep2.style.display = ''; cur.textContent = lm?.name || detailId;
    } else {
      sep2.style.display = ''; cur.textContent = TAB_LABELS[tabSlug] || '';
    }
  }

  /* ══════════════════════════════════════
     UTILS
  ══════════════════════════════════════ */
  function switchPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${id}`).classList.add('active');
  }

  document.getElementById('logo-btn').addEventListener('click', () => go(''));
  document.getElementById('back-btn').addEventListener('click', () => go(''));
  document.getElementById('bc-home').addEventListener('click', () => go(''));

  /* ══════════════════════════════════════
     INIT
  ══════════════════════════════════════ */
  route();
  </script>
</body>
</html>
